name: build-push
on:
  workflow_call:
    inputs:
      image:
        required: false
        type: string
        default: ""
        description: "Image name (defaults to repository name if empty)"
      context:
        required: false
        type: string
        default: "."
      file:
        required: false
        type: string
        default: "Dockerfile"
      runners:
        required: false
        type: string
        default: '["ubuntu-24.04", "ubuntu-24.04-arm"]'
      docker-registry:
        required: false
        type: string
        default: "ghcr.io/libops"
        description: "Docker registry prefix (e.g., 'ghcr.io/org', 'username' for Docker Hub, 'us-docker.pkg.dev/project/repo' for GAR)"
jobs:
  build:
    strategy:
      matrix:
        runner: ${{ fromJSON(inputs.runners) }}
    name: build-${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    outputs:
      image-tag: ${{ steps.record-tag.outputs.tag }}
    steps:
      - name: validate input
        id: registry
        env:
          BUILD_CONTEXT: ${{ inputs.context }}
          IMAGE_NAME: ${{ inputs.image }}
          REGISTRY_PREFIX: ${{ inputs.docker-registry }}
        run: |
          regex='^([A-Za-z0-9\.\/\-]+)?$'
          if [[ "$IMAGE_NAME" =~ $regex ]]; then
            echo "Valid docker image name"
          else
            echo "Invalid docker image name"
            exit 1
          fi
          if [[ "$BUILD_CONTEXT" =~ $regex ]]; then
            echo "Valid docker context"
          else
            echo "Invalid docker context"
            exit 1
          fi
          if [[ ! "$REGISTRY_PREFIX" =~ ^[A-Za-z0-9.-]+(/[A-Za-z0-9._/-]+)?$ ]]; then
            echo "Invalid docker registry prefix"
            exit 1
          fi
          echo "host=${REGISTRY_PREFIX%%/*}" >> "$GITHUB_OUTPUT"

      - name: GHCR Login
        if: startsWith(inputs.docker-registry, 'ghcr.io')
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to Google Cloud
        id: auth
        if: contains(inputs.docker-registry, 'pkg.dev')
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCLOUD_OIDC_POOL }}
          create_credentials_file: true
          service_account: ${{ secrets.GSA }}
          token_format: "access_token"

      - name: GAR Login
        if: contains(inputs.docker-registry, 'pkg.dev')
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          registry: ${{ steps.registry.outputs.host }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Docker Hub Login
        if: ${{ !contains(inputs.docker-registry, 'pkg.dev') && !startsWith(inputs.docker-registry, 'ghcr.io') }}
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          repository: libops/.github
          ref: f872de10579c17155eb0a0c581d9ac7088b2f836
          path: gha
          sparse-checkout: |
            ci/github/extract-docker-vars.sh
          sparse-checkout-cone-mode: false
      - run: ./gha/ci/github/extract-docker-vars.sh
        id: vars
        env:
          DOCKER_IMAGE: ${{ inputs.docker-registry }}/${{ inputs.image }}

      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3

      - name: build+push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.file }}
          push: true
          cache-from: ${{ steps.vars.outputs.cache-from }}
          cache-to: ${{ steps.vars.outputs.cache-to }}
          build-args: |
            GIT_BRANCH=${{ steps.vars.outputs.tag }}
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}-${{ steps.vars.outputs.platform }}
      - name: record image tag
        id: record-tag
        run: |
          echo "tag=${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}-${{ steps.vars.outputs.platform }}" >> "$GITHUB_OUTPUT"
  merge:
    runs-on: ubuntu-24.04
    needs:
      - build
    steps:
      - name: Resolve registry host
        id: registry
        env:
          REGISTRY_PREFIX: ${{ inputs.docker-registry }}
        run: echo "host=${REGISTRY_PREFIX%%/*}" >> "$GITHUB_OUTPUT"

      - name: GHCR Login
        if: startsWith(inputs.docker-registry, 'ghcr.io')
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to Google Cloud
        id: auth
        if: contains(inputs.docker-registry, 'pkg.dev')
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCLOUD_OIDC_POOL }}
          create_credentials_file: true
          service_account: ${{ secrets.GSA }}
          token_format: "access_token"

      - name: GAR Login
        if: contains(inputs.docker-registry, 'pkg.dev')
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          registry: ${{ steps.registry.outputs.host }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Docker Hub Login
        if: ${{ !contains(inputs.docker-registry, 'pkg.dev') && !startsWith(inputs.docker-registry, 'ghcr.io') }}
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          repository: libops/.github
          ref: f872de10579c17155eb0a0c581d9ac7088b2f836
          path: gha
          sparse-checkout: |
            ci/github/extract-docker-vars.sh
          sparse-checkout-cone-mode: false

      - run: ./gha/ci/github/extract-docker-vars.sh
        id: vars
        env:
          DOCKER_IMAGE: ${{ inputs.docker-registry }}/${{ inputs.image }}

      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3

      - name: merge platform images
        run: |
          tags=()
          mapfile -t runners < <(echo '${{ inputs.runners }}' | jq -r '.[]')
          for runner in "${runners[@]}"; do
            runner_arch="X64"
            if [[ "$runner" == *"arm"* ]]; then
              runner_arch="ARM64"
            fi
            RUNNER_ARCH="${runner_arch}" GITHUB_OUTPUT="/tmp/vars_${runner}.txt" ./gha/ci/github/extract-docker-vars.sh
            image=$(grep "^image=" "/tmp/vars_${runner}.txt" | cut -d'=' -f2)
            tag=$(grep "^tag=" "/tmp/vars_${runner}.txt" | cut -d'=' -f2)
            platform=$(grep "^platform=" "/tmp/vars_${runner}.txt" | cut -d'=' -f2)

            tags+=("${image}:${tag}-${platform}")
          done

          docker buildx imagetools create \
            -t "${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}" \
            "${tags[@]}"
        env:
          DOCKER_IMAGE: ${{ steps.vars.outputs.image }}
