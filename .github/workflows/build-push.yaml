name: build-push
on:
  workflow_call:
    inputs:
      image:
        required: false
        type: string
        default: ""
        description: "Image name (defaults to repository name if empty)"
      context:
        required: false
        type: string
        default: "."
      file:
        required: false
        type: string
        default: "Dockerfile"
      runners:
        required: false
        type: string
        default: '["ubuntu-24.04", "ubuntu-24.04-arm"]'
      docker-registry:
        required: false
        type: string
        default: "ghcr.io/libops"
        description: "Docker registry prefix (e.g., 'ghcr.io/org', 'username' for Docker Hub, 'us-docker.pkg.dev/project/repo' for GAR)"
jobs:
  build:
    strategy:
      matrix:
        runner: ${{ fromJSON(inputs.runners) }}
    name: build-${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    outputs:
      image-tag: ${{ steps.record-tag.outputs.tag }}
    steps:
      - name: validate input
        run: |
          regex='^([A-Za-z0-9\.\/\-]+)?$'
          if [[ "${{ inputs.image }}" =~ $regex ]]; then
            echo "Valid docker image name"
          else
            echo "Invalid docker image name"
            exit 1
          fi
          if [[ "${{ inputs.context }}" =~ $regex ]]; then
            echo "Valid docker context"
          else
            echo "Invalid docker context"
            exit 1
          fi

      - name: GHCR Login
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to Google Cloud
        id: auth
        if: contains(inputs.docker-registry, 'pkg.dev')
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCLOUD_OIDC_POOL }}
          create_credentials_file: true
          service_account: ${{ secrets.GSA }}
          token_format: "access_token"

      - name: GAR Login
        if: contains(inputs.docker-registry, 'pkg.dev')
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          registry: ${{ inputs.docker-registry }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Docker Hub Login
        if: ${{ !contains(inputs.docker-registry, 'pkg.dev') }}
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: libops/.github
          path: gha
          sparse-checkout: |
            ci/github/extract-docker-vars.sh
          sparse-checkout-cone-mode: false
      - run: ./gha/ci/github/extract-docker-vars.sh
        id: vars
        env:
          DOCKER_IMAGE: ${{ inputs.docker-registry }}/${{ inputs.image }}

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: build+push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.file }}
          push: true
          cache-from: ${{ steps.vars.outputs.cache-from }}
          cache-to: ${{ steps.vars.outputs.cache-to }}
          build-args: |
            GIT_BRANCH=${{ steps.vars.outputs.tag }}
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}-${{ steps.vars.outputs.platform }}
      - name: record image tag
        id: record-tag
        run: |
          echo "tag=${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}-${{ steps.vars.outputs.platform }}" >> $GITHUB_OUTPUT
  merge:
    runs-on: ubuntu-24.04
    needs:
      - build
    steps:
      - name: GHCR Login
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to Google Cloud
        id: auth
        if: contains(inputs.docker-registry, 'pkg.dev')
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCLOUD_OIDC_POOL }}
          create_credentials_file: true
          service_account: ${{ secrets.GSA }}
          token_format: "access_token"

      - name: GAR Login
        if: contains(inputs.docker-registry, 'pkg.dev')
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          registry: ${{ inputs.docker-registry }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Docker Hub Login
        if: ${{ !contains(inputs.docker-registry, 'pkg.dev') }}
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: libops/.github
          path: gha
          sparse-checkout: |
            ci/github/extract-docker-vars.sh
          sparse-checkout-cone-mode: false

      - run: ./gha/ci/github/extract-docker-vars.sh
        id: vars
        env:
          DOCKER_IMAGE: ${{ inputs.docker-registry }}/${{ inputs.image }}

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: merge platform images
        run: |
          tags=""
          mapfile -t runners < <(echo '${{ inputs.runners }}' | jq -r '.[]')
          for runner in "${runners[@]}"; do
            RUNNER_ARCH="X64"
            if [[ "$runner" == *"arm"* ]]; then
              RUNNER_ARCH="ARM64"
            fi
            GITHUB_OUTPUT=/tmp/vars_${runner}.txt ./gha/ci/github/extract-docker-vars.sh
            image=$(grep "^image=" /tmp/vars_${runner}.txt | cut -d'=' -f2)
            tag=$(grep "^tag=" /tmp/vars_${runner}.txt | cut -d'=' -f2)
            platform=$(grep "^platform=" /tmp/vars_${runner}.txt | cut -d'=' -f2)

            tags="$tags ${image}:${tag}-${platform}"
          done

          docker buildx imagetools create \
            -t "${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}" \
            $tags
        env:
          DOCKER_IMAGE: ${{ steps.vars.outputs.image }}
