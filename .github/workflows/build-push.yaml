name: build-push
on:
  workflow_call:
    inputs:
      image:
        required: false
        type: string
        default: ""
        description: "Image name (defaults to repository name if empty)"
      context:
        required: false
        type: string
        default: "."
      ref:
        required: false
        type: string
        default: ""
        description: "Exact caller commit ID to build (defaults to the triggering ref)"
      tag:
        required: false
        type: string
        default: ""
        description: "Exact Docker tag override (defaults to the triggering branch or tag)"
      expected-main-sha:
        required: false
        type: string
        default: ""
        description: "Require refs/heads/main to equal this exact commit immediately before every guarded push (caller needs contents: read)"
      file:
        required: false
        type: string
        default: "Dockerfile"
      build-args:
        required: false
        type: string
        default: ""
        description: "Additional non-secret, newline-separated Docker build arguments"
      build-timeout-minutes:
        required: false
        type: number
        default: 30
        description: "Bounded timeout for each native image build; use 5 through 120 minutes"
      runners:
        required: false
        type: string
        default: '["ubuntu-24.04", "ubuntu-24.04-arm"]'
        description: "Deprecated compatibility input; must remain the fixed LibOps hosted-runner pair"
      docker-registry:
        required: false
        type: string
        default: "ghcr.io/libops"
        description: "Docker registry prefix (e.g., 'ghcr.io/org', 'username' for Docker Hub, 'us-docker.pkg.dev/project/repo' for GAR)"
      additional-gar-registry:
        required: false
        type: string
        default: ""
        description: "Optional GAR prefix that receives the same build in addition to docker-registry (caller needs id-token: write)"
      additional-image-names:
        required: false
        type: string
        default: "[]"
        description: "JSON array of alias image names published from the same build under every configured registry prefix"
      scan:
        required: false
        type: boolean
        default: false
        description: "Scan each exact native platform image with Trivy before publishing it"
      sign:
        required: false
        type: boolean
        default: false
        description: "Keylessly sign and verify each final multi-platform manifest (caller needs id-token: write)"
      certificate-identity:
        required: false
        type: string
        default: ""
        description: "Exact Fulcio URI for the SHA-pinned reusable build-push workflow; required when sign is true"
      workload-identity-provider:
        required: false
        type: string
        default: ""
        description: "Google workload identity provider resource; falls back to GCLOUD_OIDC_POOL"
      service-account:
        required: false
        type: string
        default: ""
        description: "Google publisher service account; falls back to GSA"
    secrets:
      GCLOUD_OIDC_POOL:
        required: false
        description: "Google workload identity provider used when its corresponding input is empty"
      GSA:
        required: false
        description: "Google publisher service account used when its corresponding input is empty"
      DOCKERHUB_USER:
        required: false
        description: "Docker Hub username, required only when Docker Hub is the primary registry"
      DOCKERHUB_PASSWORD:
        required: false
        description: "Docker Hub token, required only when Docker Hub is the primary registry"
jobs:
  build:
    strategy:
      matrix:
        runner:
          - ubuntu-24.04
          - ubuntu-24.04-arm
    name: build-${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: ${{ inputs.build-timeout-minutes }}
    outputs:
      image-tag: ${{ steps.record-tag.outputs.tag }}
    steps:
      - name: validate input
        id: registry
        env:
          ADDITIONAL_GAR_REGISTRY: ${{ inputs.additional-gar-registry }}
          ADDITIONAL_IMAGE_NAMES: ${{ inputs.additional-image-names }}
          BUILD_CONTEXT: ${{ inputs.context }}
          BUILD_TIMEOUT_MINUTES: ${{ inputs.build-timeout-minutes }}
          CALLER_REF: ${{ inputs.ref }}
          CERTIFICATE_IDENTITY: ${{ inputs.certificate-identity }}
          DOCKER_FILE: ${{ inputs.file }}
          EXPECTED_MAIN_SHA: ${{ inputs.expected-main-sha }}
          IMAGE_NAME: ${{ inputs.image }}
          REGISTRY_PREFIX: ${{ inputs.docker-registry }}
          RUNNERS: ${{ inputs.runners }}
          SIGN: ${{ inputs.sign }}
          TAG_OVERRIDE: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          image_regex='^[a-z0-9]+(([._]|__|-+)[a-z0-9]+)*(/[a-z0-9]+(([._]|__|-+)[a-z0-9]+)*)*$'
          canonical_image_name="$IMAGE_NAME"
          if [[ -z "$canonical_image_name" ]]; then
            canonical_image_name="${GITHUB_REPOSITORY#*/}"
          fi
          if [[ "$canonical_image_name" =~ $image_regex ]]; then
            echo "Valid docker image name"
          else
            echo "Invalid docker image name"
            exit 1
          fi
          if ! jq -e '. == ["ubuntu-24.04", "ubuntu-24.04-arm"]' <<< "$RUNNERS" >/dev/null; then
            echo "The runners compatibility input must remain the fixed LibOps hosted-runner pair" >&2
            exit 1
          fi
          if [[ ! "$BUILD_TIMEOUT_MINUTES" =~ ^[0-9]+$ ]] ||
            ((BUILD_TIMEOUT_MINUTES < 5 || BUILD_TIMEOUT_MINUTES > 120)); then
            echo "Native build timeout must be an integer from 5 through 120 minutes" >&2
            exit 1
          fi
          validate_repo_path() {
            local value="$1"
            local label="$2"
            if [[ -z "$value" || "$value" == /* || "$value" =~ (^|/)\.\.(/|$) || ! "$value" =~ ^[A-Za-z0-9._/-]+$ ]]; then
              echo "$label must be a repository-relative path without any '..' segment" >&2
              exit 1
            fi
          }
          validate_repo_path "$BUILD_CONTEXT" "Docker context"
          validate_repo_path "$DOCKER_FILE" "Dockerfile"
          if [[ ! "$REGISTRY_PREFIX" =~ ^[A-Za-z0-9.-]+(/[A-Za-z0-9._/-]+)?$ ]]; then
            echo "Invalid docker registry prefix"
            exit 1
          fi
          if [[ -n "$CALLER_REF" && ! "$CALLER_REF" =~ ^([0-9a-fA-F]{40}|[0-9a-fA-F]{64})$ ]]; then
            echo "Caller ref must be an exact 40- or 64-character commit ID"
            exit 1
          fi
          if [[ -n "$TAG_OVERRIDE" && ! "$TAG_OVERRIDE" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "Tag override must be a valid Docker tag of at most 128 characters"
            exit 1
          fi
          if [[ -n "$EXPECTED_MAIN_SHA" ]]; then
            if [[ ! "$EXPECTED_MAIN_SHA" =~ ^([0-9a-fA-F]{40}|[0-9a-fA-F]{64})$ ]]; then
              echo "Expected main SHA must be an exact 40- or 64-character commit ID"
              exit 1
            fi
            if [[ -z "$CALLER_REF" || "${CALLER_REF,,}" != "${EXPECTED_MAIN_SHA,,}" ]]; then
              echo "Expected main SHA requires the same exact caller ref"
              exit 1
            fi
          fi
          if [[ "$SIGN" == true && ! "$CERTIFICATE_IDENTITY" =~ ^https://github\.com/[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+/\.github/workflows/build-push\.ya?ml@[0-9a-fA-F]{40}$ ]]; then
            echo "Signing requires the exact Fulcio identity of a SHA-pinned build-push reusable workflow" >&2
            exit 1
          fi
          if [[ -n "$ADDITIONAL_GAR_REGISTRY" ]]; then
            if [[ ! "$ADDITIONAL_GAR_REGISTRY" =~ ^[A-Za-z0-9-]+\.pkg\.dev/[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$ ]]; then
              echo "Additional registry must be a GAR repository prefix"
              exit 1
            fi
            if [[ "$ADDITIONAL_GAR_REGISTRY" == "$REGISTRY_PREFIX" ]]; then
              echo "Additional GAR registry must differ from the primary registry"
              exit 1
            fi
          fi

          if ! jq -e 'type == "array" and length <= 8 and all(.[]; type == "string")' <<< "$ADDITIONAL_IMAGE_NAMES" >/dev/null; then
            echo "Additional image names must be a JSON array containing at most 8 strings" >&2
            exit 1
          fi
          declare -A seen_image_names=(["$canonical_image_name"]=1)
          mapfile -t additional_image_names < <(jq -r '.[]' <<< "$ADDITIONAL_IMAGE_NAMES")
          for additional_image_name in "${additional_image_names[@]}"; do
            if [[ ! "$additional_image_name" =~ $image_regex ]]; then
              echo "Invalid additional image name: $additional_image_name" >&2
              exit 1
            fi
            if [[ -n "${seen_image_names[$additional_image_name]:-}" ]]; then
              echo "Additional image names must be unique and differ from the canonical image name" >&2
              exit 1
            fi
            seen_image_names["$additional_image_name"]=1
          done

          primary_host="${REGISTRY_PREFIX%%/*}"
          case "$primary_host" in
            ghcr.io) primary_kind=ghcr ;;
            *.pkg.dev) primary_kind=gar ;;
            *) primary_kind=dockerhub ;;
          esac
          {
            echo "primary-host=$primary_host"
            echo "primary-kind=$primary_kind"
            echo "additional-host=${ADDITIONAL_GAR_REGISTRY%%/*}"
            if (( ${#additional_image_names[@]} > 0 )); then
              echo "has-aliases=true"
            else
              echo "has-aliases=false"
            fi
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Resolve repository-confined build paths
        id: paths
        env:
          BUILD_CONTEXT: ${{ inputs.context }}
          DOCKER_FILE: ${{ inputs.file }}
        run: |
          set -euo pipefail
          workspace="$(realpath -e -- "$GITHUB_WORKSPACE")"
          context="$(realpath -e -- "$workspace/$BUILD_CONTEXT")"
          if [[ ! -d "$context" ]]; then
            echo "Docker context is not a directory: $BUILD_CONTEXT" >&2
            exit 1
          fi
          case "$context" in
            "$workspace"|"$workspace"/*) ;;
            *)
              echo "Docker context resolves outside the repository: $BUILD_CONTEXT" >&2
              exit 1
              ;;
          esac

          dockerfile="$(realpath -e -- "$context/$DOCKER_FILE")"
          if [[ ! -f "$dockerfile" ]]; then
            echo "Dockerfile is not a regular file: $DOCKER_FILE" >&2
            exit 1
          fi
          case "$dockerfile" in
            "$context"/*) ;;
            *)
              echo "Dockerfile resolves outside the Docker context: $DOCKER_FILE" >&2
              exit 1
              ;;
          esac
          {
            echo "context=$context"
            echo "file=$dockerfile"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          repository: libops/.github
          ref: f872de10579c17155eb0a0c581d9ac7088b2f836
          path: gha
          sparse-checkout: |
            ci/github/extract-docker-vars.sh
          sparse-checkout-cone-mode: false
          persist-credentials: false
      - run: ./gha/ci/github/extract-docker-vars.sh
        id: vars
        env:
          DOCKER_IMAGE: ${{ inputs.docker-registry }}/${{ inputs.image }}

      - name: Resolve publication metadata
        id: metadata
        env:
          ADDITIONAL_GAR_REGISTRY: ${{ inputs.additional-gar-registry }}
          ADDITIONAL_IMAGE_NAMES: ${{ inputs.additional-image-names }}
          DERIVED_TAG: ${{ steps.vars.outputs.tag }}
          IMAGE_NAME: ${{ inputs.image }}
          PLATFORM: ${{ steps.vars.outputs.platform }}
          PRIMARY_IMAGE: ${{ steps.vars.outputs.image }}
          TAG_OVERRIDE: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="${TAG_OVERRIDE:-$DERIVED_TAG}"
          image_name="$IMAGE_NAME"
          artifact_key="$(
            printf '%s\n' "$GITHUB_REPOSITORY" "$PRIMARY_IMAGE" "$tag" "$ADDITIONAL_IMAGE_NAMES" "$GITHUB_RUN_ID" |
              sha256sum |
              cut -c1-24
          )"
          temporary_tag="ci-${artifact_key}-${GITHUB_RUN_ATTEMPT}-${PLATFORM}"
          if [[ -z "$image_name" ]]; then
            image_name="${GITHUB_REPOSITORY#*/}"
          fi
          {
            echo "artifact-name=build-digests-$artifact_key"
            echo "tag=$tag"
            echo "temporary-tag=$temporary_tag"
            echo "primary-image=$PRIMARY_IMAGE"
            echo "primary-platform-ref=${PRIMARY_IMAGE}:${temporary_tag}"
            echo "local-image=libops-ci/build:${artifact_key}-${PLATFORM}"
            if [[ -n "$ADDITIONAL_GAR_REGISTRY" ]]; then
              echo "additional-image=${ADDITIONAL_GAR_REGISTRY}/${image_name}"
              echo "additional-platform-ref=${ADDITIONAL_GAR_REGISTRY}/${image_name}:${temporary_tag}"
            fi
          } >> "$GITHUB_OUTPUT"

      - name: GHCR Login
        if: steps.registry.outputs.primary-kind == 'ghcr'
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate primary GAR
        id: auth-primary
        if: steps.registry.outputs.primary-kind == 'gar'
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ inputs.workload-identity-provider || secrets.GCLOUD_OIDC_POOL }}
          # Only the access-token output is consumed. Do not place a Google
          # credentials file inside the caller's Docker build context.
          create_credentials_file: false
          service_account: ${{ inputs.service-account || secrets.GSA }}
          token_format: "access_token"

      - name: Primary GAR Login
        if: steps.registry.outputs.primary-kind == 'gar'
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          registry: ${{ steps.registry.outputs.primary-host }}
          username: oauth2accesstoken
          password: ${{ steps.auth-primary.outputs.access_token }}

      - name: Docker Hub Login
        if: steps.registry.outputs.primary-kind == 'dockerhub'
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3

      - name: build+push
        id: push-direct
        if: ${{ !inputs.scan && inputs.additional-gar-registry == '' && inputs.expected-main-sha == '' && steps.registry.outputs.has-aliases != 'true' }}
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: ${{ steps.paths.outputs.context }}
          file: ${{ steps.paths.outputs.file }}
          push: true
          provenance: false
          cache-from: ${{ steps.vars.outputs.cache-from }}
          cache-to: ${{ steps.vars.outputs.cache-to }}
          build-args: |
            ${{ inputs.build-args }}
            GIT_BRANCH=${{ steps.metadata.outputs.tag }}
          tags: |
            ${{ steps.metadata.outputs.primary-platform-ref }}

      - name: Build native image for verified publication
        if: ${{ inputs.scan || inputs.additional-gar-registry != '' || inputs.expected-main-sha != '' || steps.registry.outputs.has-aliases == 'true' }}
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: ${{ steps.paths.outputs.context }}
          file: ${{ steps.paths.outputs.file }}
          load: true
          platforms: linux/${{ steps.vars.outputs.platform }}
          push: false
          provenance: false
          cache-from: ${{ steps.vars.outputs.cache-from }}
          build-args: |
            ${{ inputs.build-args }}
            GIT_BRANCH=${{ steps.metadata.outputs.tag }}
          tags: ${{ steps.metadata.outputs.local-image }}

      - name: Scan exact native image
        if: inputs.scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.metadata.outputs.local-image }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          vuln-type: os,library

      - name: Record directly pushed platform digest
        if: ${{ !inputs.scan && inputs.additional-gar-registry == '' && inputs.expected-main-sha == '' && steps.registry.outputs.has-aliases != 'true' }}
        env:
          DIGEST: ${{ steps.push-direct.outputs.digest }}
          PLATFORM: ${{ steps.vars.outputs.platform }}
        run: |
          set -euo pipefail
          if [[ ! "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "BuildKit did not report a valid platform digest" >&2
            exit 1
          fi
          digest_dir="$RUNNER_TEMP/build-digests"
          mkdir -p "$digest_dir"
          printf '%s\n' "$DIGEST" > "$digest_dir/${PLATFORM}.primary"

      - name: Authenticate additional GAR
        id: auth-additional
        if: inputs.additional-gar-registry != '' && steps.registry.outputs.primary-kind != 'gar'
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ inputs.workload-identity-provider || secrets.GCLOUD_OIDC_POOL }}
          create_credentials_file: false
          service_account: ${{ inputs.service-account || secrets.GSA }}
          token_format: "access_token"

      - name: Additional GAR Login
        if: inputs.additional-gar-registry != ''
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          registry: ${{ steps.registry.outputs.additional-host }}
          username: oauth2accesstoken
          password: ${{ steps.auth-primary.outputs.access_token || steps.auth-additional.outputs.access_token }}

      - name: Push verified native image
        id: push-verified
        if: ${{ inputs.scan || inputs.additional-gar-registry != '' || inputs.expected-main-sha != '' || steps.registry.outputs.has-aliases == 'true' }}
        env:
          ADDITIONAL_GAR_REGISTRY: ${{ inputs.additional-gar-registry }}
          ADDITIONAL_IMAGE_NAMES: ${{ inputs.additional-image-names }}
          ADDITIONAL_PLATFORM_REF: ${{ steps.metadata.outputs.additional-platform-ref }}
          EXPECTED_MAIN_SHA: ${{ inputs.expected-main-sha }}
          GH_TOKEN: ${{ inputs.expected-main-sha != '' && github.token || '' }}
          LOCAL_IMAGE: ${{ steps.metadata.outputs.local-image }}
          PLATFORM: ${{ steps.vars.outputs.platform }}
          PRIMARY_PLATFORM_REF: ${{ steps.metadata.outputs.primary-platform-ref }}
          PRIMARY_REGISTRY: ${{ inputs.docker-registry }}
          TEMPORARY_TAG: ${{ steps.metadata.outputs.temporary-tag }}
        run: |
          set -euo pipefail
          digest_dir="$RUNNER_TEMP/build-digests"
          mkdir -p "$digest_dir"

          require_current_main() {
            if [[ -z "$EXPECTED_MAIN_SHA" ]]; then
              return
            fi
            current_main="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
            if [[ "${current_main,,}" != "${EXPECTED_MAIN_SHA,,}" ]]; then
              echo "Main advanced to $current_main; refusing to publish $EXPECTED_MAIN_SHA" >&2
              exit 1
            fi
          }
          push_image() {
            local target="$1"
            local digest_file="$2"
            local push_log
            local digest
            push_log="$(mktemp)"
            docker tag "$LOCAL_IMAGE" "$target"
            require_current_main
            docker push "$target" 2>&1 | tee "$push_log"
            digest="$(sed -nE 's/.*digest: (sha256:[0-9a-f]{64}).*/\1/p' "$push_log" | tail -n 1)"
            rm -f "$push_log"
            if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "Docker did not report a valid manifest digest for $target" >&2
              exit 1
            fi
            printf '%s\n' "$digest" > "$digest_file"
          }

          push_image "$PRIMARY_PLATFORM_REF" "$digest_dir/${PLATFORM}.primary"
          if [[ -n "$ADDITIONAL_PLATFORM_REF" ]]; then
            push_image "$ADDITIONAL_PLATFORM_REF" "$digest_dir/${PLATFORM}.additional"
          fi
          mapfile -t additional_image_names < <(jq -r '.[]' <<< "$ADDITIONAL_IMAGE_NAMES")
          for alias_index in "${!additional_image_names[@]}"; do
            alias_name="${additional_image_names[$alias_index]}"
            push_image \
              "${PRIMARY_REGISTRY}/${alias_name}:${TEMPORARY_TAG}" \
              "$digest_dir/${PLATFORM}.primary-alias-${alias_index}"
            if [[ -n "$ADDITIONAL_GAR_REGISTRY" ]]; then
              push_image \
                "${ADDITIONAL_GAR_REGISTRY}/${alias_name}:${TEMPORARY_TAG}" \
                "$digest_dir/${PLATFORM}.additional-alias-${alias_index}"
            fi
          done

      - name: Preserve platform digests
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ steps.metadata.outputs.artifact-name }}-${{ steps.vars.outputs.platform }}
          path: ${{ runner.temp }}/build-digests
          if-no-files-found: error
          overwrite: true
          retention-days: 1

      - name: record image tag
        id: record-tag
        run: |
          echo "tag=${{ steps.metadata.outputs.primary-platform-ref }}" >> "$GITHUB_OUTPUT"
  merge:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs:
      - build
    steps:
      - name: Resolve registry host
        id: registry
        env:
          ADDITIONAL_GAR_REGISTRY: ${{ inputs.additional-gar-registry }}
          REGISTRY_PREFIX: ${{ inputs.docker-registry }}
        run: |
          set -euo pipefail
          primary_host="${REGISTRY_PREFIX%%/*}"
          case "$primary_host" in
            ghcr.io) primary_kind=ghcr ;;
            *.pkg.dev) primary_kind=gar ;;
            *) primary_kind=dockerhub ;;
          esac
          {
            echo "primary-host=$primary_host"
            echo "primary-kind=$primary_kind"
            echo "additional-host=${ADDITIONAL_GAR_REGISTRY%%/*}"
          } >> "$GITHUB_OUTPUT"

      - name: GHCR Login
        if: steps.registry.outputs.primary-kind == 'ghcr'
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate primary GAR
        id: auth-primary
        if: steps.registry.outputs.primary-kind == 'gar'
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ inputs.workload-identity-provider || secrets.GCLOUD_OIDC_POOL }}
          # The merge job also needs only the registry access token.
          create_credentials_file: false
          service_account: ${{ inputs.service-account || secrets.GSA }}
          token_format: "access_token"

      - name: Primary GAR Login
        if: steps.registry.outputs.primary-kind == 'gar'
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          registry: ${{ steps.registry.outputs.primary-host }}
          username: oauth2accesstoken
          password: ${{ steps.auth-primary.outputs.access_token }}

      - name: Docker Hub Login
        if: steps.registry.outputs.primary-kind == 'dockerhub'
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Authenticate additional GAR
        id: auth-additional
        if: inputs.additional-gar-registry != '' && steps.registry.outputs.primary-kind != 'gar'
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ inputs.workload-identity-provider || secrets.GCLOUD_OIDC_POOL }}
          create_credentials_file: false
          service_account: ${{ inputs.service-account || secrets.GSA }}
          token_format: "access_token"

      - name: Additional GAR Login
        if: inputs.additional-gar-registry != ''
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          registry: ${{ steps.registry.outputs.additional-host }}
          username: oauth2accesstoken
          password: ${{ steps.auth-primary.outputs.access_token || steps.auth-additional.outputs.access_token }}

      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          repository: libops/.github
          ref: f872de10579c17155eb0a0c581d9ac7088b2f836
          path: gha
          sparse-checkout: |
            ci/github/extract-docker-vars.sh
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - run: ./gha/ci/github/extract-docker-vars.sh
        id: vars
        env:
          DOCKER_IMAGE: ${{ inputs.docker-registry }}/${{ inputs.image }}

      - name: Resolve publication metadata
        id: metadata
        env:
          ADDITIONAL_GAR_REGISTRY: ${{ inputs.additional-gar-registry }}
          ADDITIONAL_IMAGE_NAMES: ${{ inputs.additional-image-names }}
          DERIVED_TAG: ${{ steps.vars.outputs.tag }}
          IMAGE_NAME: ${{ inputs.image }}
          PRIMARY_IMAGE: ${{ steps.vars.outputs.image }}
          TAG_OVERRIDE: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="${TAG_OVERRIDE:-$DERIVED_TAG}"
          image_name="$IMAGE_NAME"
          artifact_key="$(
            printf '%s\n' "$GITHUB_REPOSITORY" "$PRIMARY_IMAGE" "$tag" "$ADDITIONAL_IMAGE_NAMES" "$GITHUB_RUN_ID" |
              sha256sum |
              cut -c1-24
          )"
          if [[ -z "$image_name" ]]; then
            image_name="${GITHUB_REPOSITORY#*/}"
          fi
          {
            echo "artifact-name=build-digests-$artifact_key"
            echo "tag=$tag"
            echo "primary-image=$PRIMARY_IMAGE"
            if [[ -n "$ADDITIONAL_GAR_REGISTRY" ]]; then
              echo "additional-image=${ADDITIONAL_GAR_REGISTRY}/${image_name}"
            fi
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3

      - name: Install Cosign
        if: inputs.sign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Restore platform digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: ${{ steps.metadata.outputs.artifact-name }}-*
          path: ${{ runner.temp }}/build-digests
          merge-multiple: true

      - name: merge platform images
        env:
          ADDITIONAL_IMAGE: ${{ steps.metadata.outputs.additional-image }}
          ADDITIONAL_GAR_REGISTRY: ${{ inputs.additional-gar-registry }}
          ADDITIONAL_IMAGE_NAMES: ${{ inputs.additional-image-names }}
          DIGEST_DIR: ${{ runner.temp }}/build-digests
          EXPECTED_MAIN_SHA: ${{ inputs.expected-main-sha }}
          GH_TOKEN: ${{ inputs.expected-main-sha != '' && github.token || '' }}
          PRIMARY_IMAGE: ${{ steps.metadata.outputs.primary-image }}
          PRIMARY_REGISTRY: ${{ inputs.docker-registry }}
          PUBLICATION_TAG: ${{ steps.metadata.outputs.tag }}
        run: |
          set -euo pipefail

          require_current_main() {
            if [[ -z "$EXPECTED_MAIN_SHA" ]]; then
              return
            fi
            current_main="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
            if [[ "${current_main,,}" != "${EXPECTED_MAIN_SHA,,}" ]]; then
              echo "Main advanced to $current_main; refusing to publish $EXPECTED_MAIN_SHA" >&2
              exit 1
            fi
          }
          create_manifest() {
            local target_image="$1"
            local digest_suffix="$2"
            local digest
            local platform
            local -a sources=()
            for platform in amd64 arm64; do
              digest="$(< "$DIGEST_DIR/${platform}.${digest_suffix}")"
              if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
                echo "Invalid $digest_suffix digest for $platform" >&2
                exit 1
              fi
              sources+=("${target_image}@${digest}")
            done
            require_current_main
            docker buildx imagetools create \
              -t "${target_image}:${PUBLICATION_TAG}" \
              "${sources[@]}"
          }

          create_manifest "$PRIMARY_IMAGE" primary
          if [[ -n "$ADDITIONAL_IMAGE" ]]; then
            create_manifest "$ADDITIONAL_IMAGE" additional
          fi
          mapfile -t additional_image_names < <(jq -r '.[]' <<< "$ADDITIONAL_IMAGE_NAMES")
          for alias_index in "${!additional_image_names[@]}"; do
            alias_name="${additional_image_names[$alias_index]}"
            create_manifest \
              "${PRIMARY_REGISTRY}/${alias_name}" \
              "primary-alias-${alias_index}"
            if [[ -n "$ADDITIONAL_GAR_REGISTRY" ]]; then
              create_manifest \
                "${ADDITIONAL_GAR_REGISTRY}/${alias_name}" \
                "additional-alias-${alias_index}"
            fi
          done

      - name: Verify final manifest parity
        env:
          ADDITIONAL_IMAGE: ${{ steps.metadata.outputs.additional-image }}
          ADDITIONAL_GAR_REGISTRY: ${{ inputs.additional-gar-registry }}
          ADDITIONAL_IMAGE_NAMES: ${{ inputs.additional-image-names }}
          PRIMARY_IMAGE: ${{ steps.metadata.outputs.primary-image }}
          PRIMARY_REGISTRY: ${{ inputs.docker-registry }}
          PUBLICATION_TAG: ${{ steps.metadata.outputs.tag }}
        run: |
          set -euo pipefail
          manifest_digest() {
            local tagged_ref="${1}:${PUBLICATION_TAG}"
            local digest
            digest="$(
              docker buildx imagetools inspect "$tagged_ref" --format '{{json .Manifest}}' |
                jq -er '.digest'
            )"
            if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "Registry did not report a valid final manifest digest for $tagged_ref" >&2
              exit 1
            fi
            printf '%s\n' "$digest"
          }
          require_manifest_parity() {
            local image="$1"
            local digest
            digest="$(manifest_digest "$image")"
            if [[ "$digest" != "$expected_digest" ]]; then
              echo "$image resolved to $digest, expected $expected_digest" >&2
              exit 1
            fi
          }

          expected_digest="$(manifest_digest "$PRIMARY_IMAGE")"
          if [[ -n "$ADDITIONAL_IMAGE" ]]; then
            require_manifest_parity "$ADDITIONAL_IMAGE"
          fi
          mapfile -t additional_image_names < <(jq -r '.[]' <<< "$ADDITIONAL_IMAGE_NAMES")
          for alias_name in "${additional_image_names[@]}"; do
            require_manifest_parity "${PRIMARY_REGISTRY}/${alias_name}"
            if [[ -n "$ADDITIONAL_GAR_REGISTRY" ]]; then
              require_manifest_parity "${ADDITIONAL_GAR_REGISTRY}/${alias_name}"
            fi
          done

      - name: Sign and verify final manifests
        if: inputs.sign
        env:
          ADDITIONAL_IMAGE: ${{ steps.metadata.outputs.additional-image }}
          ADDITIONAL_GAR_REGISTRY: ${{ inputs.additional-gar-registry }}
          ADDITIONAL_IMAGE_NAMES: ${{ inputs.additional-image-names }}
          CALLER_WORKFLOW_REF: ${{ github.workflow_ref }}
          CERTIFICATE_IDENTITY: ${{ inputs.certificate-identity }}
          EXPECTED_MAIN_SHA: ${{ inputs.expected-main-sha }}
          GH_TOKEN: ${{ inputs.expected-main-sha != '' && github.token || '' }}
          PRIMARY_IMAGE: ${{ steps.metadata.outputs.primary-image }}
          PRIMARY_REGISTRY: ${{ inputs.docker-registry }}
          PUBLICATION_TAG: ${{ steps.metadata.outputs.tag }}
        run: |
          set -euo pipefail

          validate_oidc_identity() {
            local encoded_payload
            local expected_job_workflow_ref
            local identity_token
            local oidc_claims
            local oidc_response
            local padding
            oidc_response="$(
              curl --fail --silent --show-error --retry 3 --retry-all-errors \
                -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
                "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sigstore"
            )"
            identity_token="$(jq -er '.value' <<< "$oidc_response")"
            encoded_payload="${identity_token#*.}"
            encoded_payload="${encoded_payload%%.*}"
            encoded_payload="${encoded_payload//-/+}"
            encoded_payload="${encoded_payload//_/\/}"
            padding=$(( ${#encoded_payload} % 4 ))
            case "$padding" in
              0) ;;
              2) encoded_payload+="==" ;;
              3) encoded_payload+="=" ;;
              *) echo "GitHub returned an invalid OIDC token" >&2; exit 1 ;;
            esac
            oidc_claims="$(printf '%s' "$encoded_payload" | base64 --decode)"
            expected_job_workflow_ref="${CERTIFICATE_IDENTITY#https://github.com/}"
            jq -e \
              --arg audience "sigstore" \
              --arg caller_ref "$GITHUB_REF" \
              --arg caller_repository "$GITHUB_REPOSITORY" \
              --arg caller_sha "$GITHUB_SHA" \
              --arg caller_workflow_ref "$CALLER_WORKFLOW_REF" \
              --arg issuer "https://token.actions.githubusercontent.com" \
              --arg job_workflow_ref "$expected_job_workflow_ref" \
              '.aud == $audience and
               .iss == $issuer and
               .job_workflow_ref == $job_workflow_ref and
               .workflow_ref == $caller_workflow_ref and
               .repository == $caller_repository and
               .ref == $caller_ref and
               .sha == $caller_sha' \
              <<< "$oidc_claims" >/dev/null || {
                echo "GitHub OIDC identity does not match the pinned builder and exact caller" >&2
                exit 1
              }
            unset identity_token oidc_claims oidc_response
          }

          require_current_main() {
            if [[ -z "$EXPECTED_MAIN_SHA" ]]; then
              return
            fi
            current_main="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
            if [[ "${current_main,,}" != "${EXPECTED_MAIN_SHA,,}" ]]; then
              echo "Main advanced to $current_main; refusing to sign $EXPECTED_MAIN_SHA" >&2
              exit 1
            fi
          }
          sign_and_verify() {
            local image="$1"
            local tagged_ref="${image}:${PUBLICATION_TAG}"
            local digest
            local digest_ref
            digest="$(
              docker buildx imagetools inspect "$tagged_ref" --format '{{json .Manifest}}' |
                jq -er '.digest'
            )"
            if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "Registry did not report a valid final manifest digest for $tagged_ref" >&2
              exit 1
            fi
            digest_ref="${image}@${digest}"

            require_current_main
            cosign sign --yes \
              -a "caller-workflow-ref=${CALLER_WORKFLOW_REF}" \
              "$digest_ref"
            cosign verify \
              --certificate-identity "$CERTIFICATE_IDENTITY" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              --certificate-github-workflow-repository "$GITHUB_REPOSITORY" \
              --certificate-github-workflow-ref "$GITHUB_REF" \
              --certificate-github-workflow-sha "$GITHUB_SHA" \
              -a "caller-workflow-ref=${CALLER_WORKFLOW_REF}" \
              "$digest_ref" >/dev/null
          }

          validate_oidc_identity
          sign_and_verify "$PRIMARY_IMAGE"
          if [[ -n "$ADDITIONAL_IMAGE" ]]; then
            sign_and_verify "$ADDITIONAL_IMAGE"
          fi
          mapfile -t additional_image_names < <(jq -r '.[]' <<< "$ADDITIONAL_IMAGE_NAMES")
          for alias_name in "${additional_image_names[@]}"; do
            sign_and_verify "${PRIMARY_REGISTRY}/${alias_name}"
            if [[ -n "$ADDITIONAL_GAR_REGISTRY" ]]; then
              sign_and_verify "${ADDITIONAL_GAR_REGISTRY}/${alias_name}"
            fi
          done

  cleanup:
    name: cleanup-staging-tags
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs:
      - build
      - merge
    if: ${{ always() }}
    # Cleanup is deliberately best effort. A registry or IAM cleanup outage must
    # not turn an already verified publication into a failed release rerun.
    continue-on-error: true
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        if: needs.merge.result == 'success'
        with:
          repository: libops/.github
          ref: f872de10579c17155eb0a0c581d9ac7088b2f836
          path: gha
          sparse-checkout: |
            ci/github/extract-docker-vars.sh
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Resolve derived image values
        if: needs.merge.result == 'success'
        id: vars
        run: ./gha/ci/github/extract-docker-vars.sh
        env:
          DOCKER_IMAGE: ${{ inputs.docker-registry }}/${{ inputs.image }}

      - name: Resolve successful publication cleanup scope
        if: needs.merge.result == 'success'
        id: cleanup
        env:
          ADDITIONAL_GAR_REGISTRY: ${{ inputs.additional-gar-registry }}
          ADDITIONAL_IMAGE_NAMES: ${{ inputs.additional-image-names }}
          DERIVED_TAG: ${{ steps.vars.outputs.tag }}
          PRIMARY_IMAGE: ${{ steps.vars.outputs.image }}
          PRIMARY_REGISTRY: ${{ inputs.docker-registry }}
          TAG_OVERRIDE: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          image_regex='^[a-z0-9]+(([._]|__|-+)[a-z0-9]+)*(/[a-z0-9]+(([._]|__|-+)[a-z0-9]+)*)*$'
          registry_regex='^[A-Za-z0-9.-]+(/[A-Za-z0-9._/-]+)?$'
          tag="${TAG_OVERRIDE:-$DERIVED_TAG}"
          primary_path="${PRIMARY_IMAGE#*/}"

          if [[ ! "$PRIMARY_REGISTRY" =~ $registry_regex ||
                "$primary_path" == "$PRIMARY_IMAGE" ||
                ! "$primary_path" =~ $image_regex ||
                ! "$tag" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "Cleanup scope did not pass registry, image, and tag validation" >&2
            exit 1
          fi
          if ! jq -e 'type == "array" and length <= 8 and all(.[]; type == "string")' \
            <<< "$ADDITIONAL_IMAGE_NAMES" >/dev/null; then
            echo "Cleanup aliases must be a JSON array containing at most 8 strings" >&2
            exit 1
          fi
          mapfile -t aliases < <(jq -r '.[]' <<< "$ADDITIONAL_IMAGE_NAMES")
          for alias_name in "${aliases[@]}"; do
            if [[ ! "$alias_name" =~ $image_regex ]]; then
              echo "Invalid cleanup alias: $alias_name" >&2
              exit 1
            fi
          done

          primary_host="${PRIMARY_REGISTRY%%/*}"
          case "$primary_host" in
            *-docker.pkg.dev) primary_kind=gar ;;
            ghcr.io) primary_kind=ghcr ;;
            *) primary_kind=unsupported ;;
          esac
          if [[ -n "$ADDITIONAL_GAR_REGISTRY" &&
                ! "$ADDITIONAL_GAR_REGISTRY" =~ ^[A-Za-z0-9-]+-docker\\.pkg\\.dev/[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$ ]]; then
            echo "Cleanup additional registry must be a GAR Docker repository prefix" >&2
            exit 1
          fi

          artifact_key="$(
            printf '%s\\n' "$GITHUB_REPOSITORY" "$PRIMARY_IMAGE" "$tag" "$ADDITIONAL_IMAGE_NAMES" "$GITHUB_RUN_ID" |
              sha256sum |
              cut -c1-24
          )"
          {
            echo "artifact-key=$artifact_key"
            echo "primary-kind=$primary_kind"
          } >> "$GITHUB_OUTPUT"

      - name: Authenticate GAR for exact tag cleanup
        id: auth-cleanup
        if: ${{ needs.merge.result == 'success' && steps.cleanup.outcome == 'success' && (steps.cleanup.outputs.primary-kind == 'gar' || inputs.additional-gar-registry != '') }}
        continue-on-error: true
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ inputs.workload-identity-provider || secrets.GCLOUD_OIDC_POOL }}
          create_credentials_file: false
          service_account: ${{ inputs.service-account || secrets.GSA }}
          token_format: "access_token"

      - name: Remove exact GAR staging tags after verified merge
        if: ${{ needs.merge.result == 'success' && steps.cleanup.outcome == 'success' && (steps.cleanup.outputs.primary-kind == 'gar' || inputs.additional-gar-registry != '') }}
        env:
          ACCESS_TOKEN: ${{ steps.auth-cleanup.outputs.access_token }}
          ADDITIONAL_GAR_REGISTRY: ${{ inputs.additional-gar-registry }}
          ADDITIONAL_IMAGE_NAMES: ${{ inputs.additional-image-names }}
          ARTIFACT_KEY: ${{ steps.cleanup.outputs.artifact-key }}
          IMAGE_NAME: ${{ inputs.image }}
          PRIMARY_IMAGE: ${{ steps.vars.outputs.image }}
          PRIMARY_KIND: ${{ steps.cleanup.outputs.primary-kind }}
          PRIMARY_REGISTRY: ${{ inputs.docker-registry }}
        run: |
          set -euo pipefail
          warn() {
            echo "::warning title=Staging tag cleanup::$*"
          }
          if [[ -z "$ACCESS_TOKEN" ]]; then
            warn "GAR authentication failed; leaving staging tags intact"
            exit 0
          fi

          mapfile -t aliases < <(jq -r '.[]' <<< "$ADDITIONAL_IMAGE_NAMES")
          images=()
          if [[ "$PRIMARY_KIND" == gar ]]; then
            images+=("$PRIMARY_IMAGE")
            for alias_name in "${aliases[@]}"; do
              images+=("${PRIMARY_REGISTRY}/${alias_name}")
            done
          fi
          if [[ -n "$ADDITIONAL_GAR_REGISTRY" ]]; then
            canonical_name="$IMAGE_NAME"
            if [[ -z "$canonical_name" ]]; then
              canonical_name="${GITHUB_REPOSITORY#*/}"
            fi
            images+=("${ADDITIONAL_GAR_REGISTRY}/${canonical_name}")
            for alias_name in "${aliases[@]}"; do
              images+=("${ADDITIONAL_GAR_REGISTRY}/${alias_name}")
            done
          fi

          api_root="${ARTIFACT_REGISTRY_API_ROOT:-https://artifactregistry.googleapis.com/v1}"
          for image in "${images[@]}"; do
            host="${image%%/*}"
            path="${image#*/}"
            project="${path%%/*}"
            path="${path#*/}"
            repository="${path%%/*}"
            package="${path#*/}"
            location="${host%-docker.pkg.dev}"
            if [[ "$host" != "${location}-docker.pkg.dev" ||
                  -z "$location" || -z "$project" || -z "$repository" ||
                  -z "$package" || "$package" == "$path" ]]; then
              warn "Refusing malformed GAR cleanup image $image"
              continue
            fi
            encoded_package="$(jq -rn --arg value "$package" '$value | @uri')"
            permission_denied=false
            for attempt in $(seq 1 "$GITHUB_RUN_ATTEMPT"); do
              for platform in amd64 arm64; do
                staging_tag="ci-${ARTIFACT_KEY}-${attempt}-${platform}"
                url="${api_root}/projects/${project}/locations/${location}/repositories/${repository}/packages/${encoded_package}/tags/${staging_tag}"
                response="$(mktemp)"
                status="$(
                  curl --silent --show-error --retry 3 --retry-all-errors \
                    --output "$response" \
                    --write-out '%{http_code}' \
                    --request DELETE \
                    --header "Authorization: Bearer ${ACCESS_TOKEN}" \
                    "$url" || true
                )"
                case "$status" in
                  200|404) ;;
                  401|403)
                    warn "GAR tag cleanup lacks artifactregistry.tags.delete for $image"
                    permission_denied=true
                    ;;
                  *)
                    message="$(jq -r '.error.message // "unknown registry error"' "$response" 2>/dev/null || true)"
                    warn "GAR refused exact tag cleanup for ${image}:${staging_tag}: HTTP ${status} ${message}"
                    ;;
                esac
                rm -f "$response"
                if [[ "$permission_denied" == true ]]; then
                  break 2
                fi
              done
            done
          done

      - name: Report retained staging tags
        if: ${{ always() }}
        env:
          ADDITIONAL_GAR_REGISTRY: ${{ inputs.additional-gar-registry }}
          MERGE_RESULT: ${{ needs.merge.result }}
          PRIMARY_REGISTRY: ${{ inputs.docker-registry }}
        run: |
          set -euo pipefail
          if [[ "$MERGE_RESULT" != success ]]; then
            echo "::warning title=Staging tag cleanup::Publication did not merge successfully; retaining all exact ci-* tags for a failed-job rerun."
            exit 0
          fi
          primary_host="${PRIMARY_REGISTRY%%/*}"
          if [[ "$primary_host" == ghcr.io ]]; then
            echo "::warning title=Staging tag cleanup::GHCR has no conditional tag-only delete; retaining exact ci-* tags to avoid deleting a published native version."
          elif [[ "$primary_host" != *-docker.pkg.dev ]]; then
            echo "::warning title=Staging tag cleanup::${PRIMARY_REGISTRY} has no safe cleanup implementation; exact ci-* tags remain."
          fi
          if [[ -z "$ADDITIONAL_GAR_REGISTRY" && "$primary_host" != *-docker.pkg.dev ]]; then
            echo "No GAR staging tags required cleanup."
          fi
