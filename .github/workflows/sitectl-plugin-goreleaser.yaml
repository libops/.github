name: sitectl-plugin-goreleaser

on:
  workflow_call:
    inputs:
      go-version:
        required: false
        type: string
        default: ">=1.26.1"
      goreleaser-args:
        required: false
        type: string
        default: "release --clean"
      package-name:
        required: true
        type: string
      publish-package-repo:
        required: false
        type: boolean
        default: true
      run-goreleaser:
        description: Run GoReleaser before package publication
        required: false
        type: boolean
        default: true
      release-version:
        description: Existing semver tag to republish when run-goreleaser is false
        required: false
        type: string
        default: ""
      sitectl-ref:
        required: false
        type: string
        default: "main"

permissions:
  contents: write
  id-token: write

jobs:
  goreleaser:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          fetch-depth: 0

      - name: Checkout sitectl SDK
        if: ${{ inputs.run-goreleaser && hashFiles('go.work') != '' }}
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth=1 --branch "${{ inputs.sitectl-ref }}" https://github.com/libops/sitectl ../sitectl

      - name: Set up Go
        if: ${{ inputs.run-goreleaser }}
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: ${{ inputs.go-version }}

      - name: Validate release mode
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.release-version }}
          RUN_GORELEASER: ${{ inputs.run-goreleaser }}
        run: |
          set -euo pipefail
          if [[ "$RUN_GORELEASER" == "true" ]]; then
            if [[ -n "$RELEASE_VERSION" ]]; then
              echo "release-version is only valid when run-goreleaser is false" >&2
              exit 1
            fi
            exit 0
          fi
          if [[ ! "$RELEASE_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "package-only recovery requires release-version in vMAJOR.MINOR.PATCH form" >&2
            exit 1
          fi
          gh release view "$RELEASE_VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --json isDraft \
            --jq 'select(.isDraft == false) | .isDraft' \
            | grep -Fxq false

      - name: Run GoReleaser
        if: ${{ inputs.run-goreleaser }}
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          distribution: goreleaser
          # This binary receives two separately scoped tokens. Review and
          # advance the exact release deliberately instead of executing latest.
          version: v2.17.0
          args: ${{ inputs.goreleaser-args }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_REPO_TOKEN: ${{ secrets.HOMEBREW_REPO }}

      - name: Authenticate to Google Cloud
        if: ${{ inputs.publish-package-repo }}
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.LIBOPS_PACKAGES_GCLOUD_OIDC_POOL }}
          service_account: ${{ vars.LIBOPS_PACKAGES_GSA }}
          create_credentials_file: true

      - name: Checkout Package Publisher
        if: ${{ inputs.publish-package-repo }}
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          repository: libops/terraform-linux-packages
          # This checkout runs with GCP publication credentials; keep it immutable.
          ref: 285183831e6e5c14ec34d87e208629949f5b627c # main
          path: .libops-packages

      - name: Publish Linux package repository
        if: ${{ inputs.publish-package-repo }}
        shell: bash
        working-directory: .libops-packages
        env:
          GH_TOKEN: ${{ github.token }}
          GCLOUD_PROJECT: ${{ vars.LIBOPS_PACKAGES_GCLOUD_PROJECT }}
          GCS_BUCKET: ${{ vars.LIBOPS_PACKAGES_GCS_BUCKET }}
          APTLY_GPG_KEY_ID: ${{ vars.LIBOPS_PACKAGES_APTLY_GPG_KEY_ID }}
          APTLY_GPG_PRIVATE_KEY_SECRET: ${{ vars.LIBOPS_PACKAGES_APTLY_GPG_PRIVATE_KEY_SECRET }}
          APTLY_GPG_PASSPHRASE_SECRET: ${{ vars.LIBOPS_PACKAGES_APTLY_GPG_PASSPHRASE_SECRET }}
          LOCK_TIMEOUT_SECONDS: "7200"
        run: |
          set -euo pipefail
          make package \
            GITHUB_REPOSITORY="${GITHUB_REPOSITORY}" \
            PACKAGE_NAME="${{ inputs.package-name }}" \
            GCS_BUCKET_PREFIX="sitectl" \
            APTLY_LABEL="sitectl" \
            APTLY_PUBLIC_KEY_NAME="sitectl-archive-keyring" \
            RELEASE_VERSION="${{ inputs.release-version || github.ref_name }}"
