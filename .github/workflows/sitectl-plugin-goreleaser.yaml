name: sitectl-plugin-goreleaser

on:
  workflow_call:
    inputs:
      go-version:
        required: false
        type: string
        default: "1.26.5"
      goreleaser-args:
        required: false
        type: string
        default: "release --clean"
      package-name:
        required: true
        type: string
      publish-package-repo:
        required: false
        type: boolean
        default: true
      release-mode:
        description: Full release, Homebrew-only recovery, or package-only recovery
        required: false
        type: string
        default: full
      release-version:
        description: Existing semver tag for a recovery mode
        required: false
        type: string
        default: ""
      sitectl-ref:
        required: false
        type: string
        default: "65cfde137a58ba14aaa9a1512d88b943888872f3"
    secrets:
      HOMEBREW_REPO:
        description: Fine-grained token with contents and pull-request access to libops/homebrew
        required: true

permissions: {}

concurrency:
  group: sitectl-plugin-release-${{ github.repository }}-${{ inputs.release-version || github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-24.04
    permissions: {}
    steps:
      - name: Validate release request
        shell: bash
        env:
          PACKAGE_NAME: ${{ inputs.package-name }}
          PUBLISH_PACKAGE_REPO: ${{ inputs.publish-package-repo }}
          RELEASE_MODE: ${{ inputs.release-mode }}
        run: |
          set -euo pipefail
          case "$RELEASE_MODE" in
            full|homebrew-only|packages-only) ;;
            *)
              echo "release-mode must be full, homebrew-only, or packages-only" >&2
              exit 1
              ;;
          esac
          if [[ ! "$PACKAGE_NAME" =~ ^sitectl(-[a-z0-9]+)*$ || "$GITHUB_REPOSITORY" != "libops/$PACKAGE_NAME" ]]; then
            echo "package-name must be a canonical sitectl name matching its libops source repository" >&2
            exit 1
          fi
          if [[ "$RELEASE_MODE" == "packages-only" && "$PUBLISH_PACKAGE_REPO" != "true" ]]; then
            echo "packages-only recovery requires publish-package-repo=true" >&2
            exit 1
          fi

  release:
    needs: validate
    if: ${{ inputs.release-mode == 'full' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      version: ${{ steps.validate_full.outputs.version }}
    steps:
      - name: Validate full release
        id: validate_full
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          RELEASE_VERSION: ${{ inputs.release-version }}
        run: |
          set -euo pipefail
          readonly semver_pattern='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'
          default_branch="$(gh api "repos/${GITHUB_REPOSITORY}" --jq .default_branch)"
          if [[ -z "$default_branch" ]]; then
            echo "source repository has no default branch" >&2
            exit 1
          fi
          version=""
          case "$REF_TYPE" in
            tag)
              if [[ -n "$RELEASE_VERSION" || ! "$REF_NAME" =~ $semver_pattern ]]; then
                echo "tag-triggered full releases require a vMAJOR.MINOR.PATCH tag ref and no release-version input" >&2
                exit 1
              fi
              version="$REF_NAME"
              ;;
            branch)
              if [[ ! "$RELEASE_VERSION" =~ $semver_pattern ]]; then
                echo "full recovery requires release-version in vMAJOR.MINOR.PATCH form" >&2
                exit 1
              fi
              if [[ "$REF_NAME" != "$default_branch" ]]; then
                echo "full recovery must run from the repository default branch (${default_branch})" >&2
                exit 1
              fi
              version="$RELEASE_VERSION"
              ;;
            *)
              echo "full releases require a tag ref or a default-branch recovery" >&2
              exit 1
              ;;
          esac

          tag_ref="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${version}" --jq .ref)"
          if [[ "$tag_ref" != "refs/tags/${version}" ]]; then
            echo "release tag ${version} does not resolve to the exact requested ref" >&2
            exit 1
          fi
          tag_commit="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${version}" --jq .sha)"
          if [[ ! "$tag_commit" =~ ^[0-9a-f]{40}$ ]]; then
            echo "release tag ${version} does not resolve to an exact commit" >&2
            exit 1
          fi

          release_state="$(
            gh api -H "X-GitHub-Api-Version: 2026-03-10" --paginate \
              "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
              --jq ".[] | select(.tag_name == \"${version}\") | [.tag_name, .draft, .prerelease, (.published_at != null), .immutable, (.assets | length)] | @tsv"
          )"
          readonly expected_empty_release="${version}"$'\tfalse\tfalse\ttrue\tfalse\t0'
          if [[ "$REF_TYPE" == "branch" && -z "$release_state" ]]; then
            echo "full recovery requires an existing exact published, non-prerelease, mutable release with zero assets" >&2
            exit 1
          fi
          if [[ -n "$release_state" && "$release_state" != "$expected_empty_release" ]]; then
            echo "release ${version} must be an exact published, non-prerelease, mutable release with zero assets" >&2
            exit 1
          fi
          {
            printf 'version=%s\n' "$version"
            printf 'default_branch=%s\n' "$default_branch"
            printf 'tag_commit=%s\n' "$tag_commit"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout release source
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          fetch-depth: 0
          ref: refs/tags/${{ steps.validate_full.outputs.version }}
          persist-credentials: false

      - name: Verify exact release source
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ steps.validate_full.outputs.default_branch }}
          EXPECTED_COMMIT: ${{ steps.validate_full.outputs.tag_commit }}
          EXPECTED_VERSION: ${{ steps.validate_full.outputs.version }}
        run: |
          set -euo pipefail
          tag_commit="$(git rev-parse --verify "refs/tags/${EXPECTED_VERSION}^{commit}")"
          actual_commit="$(git rev-parse --verify "HEAD^{commit}")"
          default_commit="$(git rev-parse --verify "refs/remotes/origin/${DEFAULT_BRANCH}^{commit}")"
          if [[ "$tag_commit" != "$EXPECTED_COMMIT" || "$actual_commit" != "$EXPECTED_COMMIT" ]]; then
            echo "checkout HEAD does not match the exact release tag commit" >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "$EXPECTED_COMMIT" "$default_commit"; then
            echo "release tag commit is not reachable from the source default branch" >&2
            exit 1
          fi

      - name: Checkout sitectl SDK
        if: ${{ hashFiles('go.work') != '' }}
        shell: bash
        env:
          SITECTL_REF: ${{ inputs.sitectl-ref }}
        run: |
          set -euo pipefail
          if [[ ! "$SITECTL_REF" =~ ^[0-9a-f]{40}$ ]]; then
            echo "sitectl-ref must be an exact 40-character commit SHA" >&2
            exit 1
          fi
          git init --quiet ../sitectl
          git -C ../sitectl remote add origin https://github.com/libops/sitectl
          git -C ../sitectl fetch --quiet --depth=1 origin "$SITECTL_REF"
          git -C ../sitectl checkout --quiet --detach FETCH_HEAD
          actual_sitectl_sha="$(git -C ../sitectl rev-parse HEAD)"
          if [[ "$actual_sitectl_sha" != "$SITECTL_REF" ]]; then
            echo "sitectl checkout does not match sitectl-ref" >&2
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: ${{ inputs.go-version }}

      - name: Publish release assets
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          distribution: goreleaser
          # This binary receives only the caller repository token. Homebrew is
          # reconciled from the resulting published release assets in a
          # separately privileged job.
          version: v2.17.0
          args: ${{ inputs.goreleaser-args }} --skip=homebrew
        env:
          GORELEASER_DISABLE_SCM_RELEASE: "false"
          GITHUB_TOKEN: ${{ github.token }}

  homebrew:
    needs: [validate, release]
    if: >-
      ${{
        always() &&
        needs.validate.result == 'success' &&
        inputs.release-mode != 'packages-only' &&
        (needs.release.result == 'success' ||
          (inputs.release-mode == 'homebrew-only' && needs.release.result == 'skipped'))
      }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Validate Homebrew reconciliation mode
        shell: bash
        env:
          RELEASE_MODE: ${{ inputs.release-mode }}
        run: |
          set -euo pipefail
          case "$RELEASE_MODE" in
            full|homebrew-only) ;;
            *)
              echo "Homebrew reconciliation mode must be full or homebrew-only" >&2
              exit 1
              ;;
          esac

      - name: Checkout exact shared reconciliation source
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .libops-workflow
          persist-credentials: false

      - name: Verify shared reconciliation source
        shell: bash
        env:
          EXPECTED_SHA: ${{ job.workflow_sha }}
        run: |
          set -euo pipefail
          actual_sha="$(git -C .libops-workflow rev-parse HEAD)"
          if [[ "$actual_sha" != "$EXPECTED_SHA" ]]; then
            echo "shared reconciliation checkout does not match the reusable workflow SHA" >&2
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: "1.26.5"
          cache: false

      - name: Reconcile Homebrew from published assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          HOMEBREW_TOKEN: ${{ secrets.HOMEBREW_REPO }}
          PACKAGE_NAME: ${{ inputs.package-name }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          RELEASE_MODE: ${{ inputs.release-mode }}
          RELEASE_VERSION: ${{ inputs.release-mode == 'full' && needs.release.outputs.version || inputs.release-version }}
        run: |
          set -euo pipefail
          go run .libops-workflow/ci/github/homebrew-reconcile/main.go

  publish-linux-packages:
    needs: [validate, release, homebrew]
    if: >-
      ${{
        always() &&
        needs.validate.result == 'success' &&
        inputs.publish-package-repo &&
        inputs.release-mode != 'homebrew-only' &&
        ((inputs.release-mode == 'full' &&
          needs.release.result == 'success' &&
          needs.homebrew.result == 'success') ||
          (inputs.release-mode == 'packages-only' &&
            needs.release.result == 'skipped' &&
            needs.homebrew.result == 'skipped'))
      }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Validate package publication
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          RELEASE_MODE: ${{ inputs.release-mode }}
          RELEASE_VERSION: ${{ inputs.release-mode == 'full' && needs.release.outputs.version || inputs.release-version }}
          REQUESTED_RELEASE_VERSION: ${{ inputs.release-version }}
        run: |
          set -euo pipefail
          require_default_branch() {
            local default_branch
            default_branch="$(gh api "repos/${GITHUB_REPOSITORY}" --jq .default_branch)"
            if [[ "$REF_TYPE" != "branch" || "$REF_NAME" != "$default_branch" ]]; then
              echo "${RELEASE_MODE} recovery must run from the repository default branch (${default_branch})" >&2
              exit 1
            fi
          }
          case "$RELEASE_MODE" in
            full)
              if [[ ! "$RELEASE_VERSION" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
                echo "full package publication requires an exact vMAJOR.MINOR.PATCH version" >&2
                exit 1
              fi
              case "$REF_TYPE" in
                tag)
                  if [[ -n "$REQUESTED_RELEASE_VERSION" || "$REF_NAME" != "$RELEASE_VERSION" ]]; then
                    echo "tag-triggered full package publication must match its tag and omit release-version" >&2
                    exit 1
                  fi
                  ;;
                branch)
                  require_default_branch
                  if [[ "$REQUESTED_RELEASE_VERSION" != "$RELEASE_VERSION" ]]; then
                    echo "full package recovery must use the exact requested release-version" >&2
                    exit 1
                  fi
                  ;;
                *)
                  echo "full package publication requires a tag or default-branch recovery" >&2
                  exit 1
                  ;;
              esac
              ;;
            packages-only)
              require_default_branch
              if [[ ! "$RELEASE_VERSION" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
                echo "packages-only recovery requires release-version in vMAJOR.MINOR.PATCH form" >&2
                exit 1
              fi
              ;;
            *)
              echo "invalid package publication mode: $RELEASE_MODE" >&2
              exit 1
              ;;
          esac
          release_state="$(gh release view "$RELEASE_VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --json tagName,isDraft,isPrerelease,publishedAt \
            --jq '[.tagName, .isDraft, .isPrerelease, (.publishedAt != null)] | @tsv')"
          if [[ "$release_state" != "${RELEASE_VERSION}"$'\tfalse\tfalse\ttrue' ]]; then
            echo "package publication requires the exact published, non-prerelease release" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.LIBOPS_PACKAGES_GCLOUD_OIDC_POOL }}
          service_account: ${{ vars.LIBOPS_PACKAGES_GSA }}
          create_credentials_file: true

      - name: Checkout Package Publisher
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          repository: libops/terraform-linux-packages
          # This checkout runs with GCP publication credentials; keep it immutable.
          ref: 285183831e6e5c14ec34d87e208629949f5b627c # main
          path: .libops-packages
          persist-credentials: false

      - name: Publish Linux package repository
        shell: bash
        working-directory: .libops-packages
        env:
          GH_TOKEN: ${{ github.token }}
          GCLOUD_PROJECT: ${{ vars.LIBOPS_PACKAGES_GCLOUD_PROJECT }}
          GCS_BUCKET: ${{ vars.LIBOPS_PACKAGES_GCS_BUCKET }}
          APTLY_GPG_KEY_ID: ${{ vars.LIBOPS_PACKAGES_APTLY_GPG_KEY_ID }}
          APTLY_GPG_PRIVATE_KEY_SECRET: ${{ vars.LIBOPS_PACKAGES_APTLY_GPG_PRIVATE_KEY_SECRET }}
          APTLY_GPG_PASSPHRASE_SECRET: ${{ vars.LIBOPS_PACKAGES_APTLY_GPG_PASSPHRASE_SECRET }}
          LOCK_TIMEOUT_SECONDS: "7200"
          PACKAGE_NAME: ${{ inputs.package-name }}
          RELEASE_VERSION: ${{ inputs.release-mode == 'full' && needs.release.outputs.version || inputs.release-version }}
        run: |
          set -euo pipefail
          make package \
            GITHUB_REPOSITORY="${GITHUB_REPOSITORY}" \
            PACKAGE_NAME="${PACKAGE_NAME}" \
            GCS_BUCKET_PREFIX="sitectl" \
            APTLY_LABEL="sitectl" \
            APTLY_PUBLIC_KEY_NAME="sitectl-archive-keyring" \
            RELEASE_VERSION="${RELEASE_VERSION}"
