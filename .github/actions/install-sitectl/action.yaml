name: install-sitectl
description: Install sitectl packages from packages.libops.io
inputs:
  packages:
    description: Space-separated sitectl apt packages to install.
    required: false
    default: sitectl
  package-versions:
    description: Space-separated package=version assignments. When set, every package must have exactly one SemVer version.
    required: false
    default: ""
  allow-unversioned:
    description: Permit compatibility installs without package-versions. Unversioned installs emit a warning and resolve the latest package available at run time.
    required: false
    default: "true"
runs:
  using: composite
  steps:
    - name: Install sitectl packages
      shell: bash
      env:
        PACKAGES: ${{ inputs.packages }}
        PACKAGE_VERSIONS: ${{ inputs.package-versions }}
        ALLOW_UNVERSIONED: ${{ inputs.allow-unversioned }}
      run: "${GITHUB_ACTION_PATH}/install.sh"
